inventory:
  csv_path: ./data/sample_inventory.csv
  refresh_interval_seconds: 60

telemetry:
  # Event collector format. Two orthogonal axes:
  #   - default_source (below) selects WHERE events are read from (local file vs S3)
  #   - event_source (here)   selects WHAT format the event stream is in
  # See runbooks/CVE-2026-31431_sigma_validation.md for the auditd path.
  event_source: osquery          # osquery | auditd | both
  local_json_path: ./data/sample_events.json    # osquery-shaped normalized events
  local_auditd_path: ./data/sample_auditd.log   # raw audit.log (consumed when event_source includes 'auditd')
  s3_manifest_path: ./data/s3_manifest.json
  lookback_hours: 24
  default_source: local          # local | s3 (data location) — overridden by --raw-telemetry flag

aws:
  profile_name: default          # Named AWS profile from ~/.aws/credentials
  # Set to a specific profile name for non-default, e.g. "security-audit"

agent:
  thioclaw_bin: ./scripts/thioclaw.py
  timeout_seconds: 120

orchestrator:
  run_interval_seconds: 300
  max_concurrent_runs: 4

output:
  findings_dir: ./findings
  docs_dir: ./docs
  yaml: true
  markdown: true

observability:
  log_path: ./logs/agent_runs.jsonl
  metrics_port: 9090
  trace_endpoint: null           # Set to OTel collector URL to enable remote export
  service_name: thioclaw-harness
