title: "OpenClaw Findings"
description: "Automated vulnerability exploitation investigation reports"
theme: minima
baseurl: "/ThIOClaw"
url: "https://tej-nik.github.io"

# Build settings
markdown: kramdown
highlighter: rouge

# Collections
collections:
  findings:
    output: true
    permalink: /findings/:name/

# Exclude from build
exclude:
  - requirements.txt
  - "*.py"
  - harness/
  - observability/
  - tests/
  - notebooks/
  - data/
  - findings/
  - logs/
  - signals/
  - queries/
